// ─── Production Forecast ──────────────────────────────────────────────────────

function ProductionForecast() {
  const W = 292, H = 90
  const maxKwh = Math.max(...forecastDays.map(d => d.kwh))
  const colW = W / forecastDays.length
  const barW = colW * 0.55
  const maxBarH = 52
  const barBaseY = H - 16

  const weatherColor = { sunny: "#fbbf24", partly: "#d1d5db", rainy: "#60a5fa" }
  const weatherShape = (type, cx, cy) => {
    if (type === "sunny")  return <circle cx={cx} cy={cy} r="3.5" fill="#fbbf24" />
    if (type === "rainy")  return <circle cx={cx} cy={cy} r="3.5" fill="#60a5fa" />
    return <circle cx={cx} cy={cy} r="3.5" fill="#9ca3af" />
  }

  // Projected payout: already-earned + remaining forecast
  const alreadyEarned = 14.8 // days 1–20 at ~0.069/kWh
  const remaining = forecastDays.slice(0).reduce((s, d) => s + d.kwh * 0.069, 0)
  const low = (alreadyEarned + remaining * 0.93).toFixed(0)
  const high = (alreadyEarned + remaining * 1.07).toFixed(0)
  const progress = Math.round((21 / 31) * 100)

  return (
    <div className="bg-gray-900 rounded-2xl p-4 mb-3">
      <div className="flex justify-between items-start mb-3">
        <div>
          <p className="text-xs font-semibold text-gray-300">March Payout Forecast</p>
          <p className="text-xs text-gray-500 mt-0.5">Based on 14-day weather outlook</p>
        </div>
        <div className="text-right">
          <p className="text-base font-bold text-amber-400">€{low}–{high}</p>
          <p className="text-xs text-gray-500">projected</p>
        </div>
      </div>

      {/* Progress through month */}
      <div className="flex items-center gap-2 mb-3">
        <div className="flex-1 bg-gray-800 rounded-full h-1.5">
          <div className="bg-amber-500 h-1.5 rounded-full" style={{ width: `${progress}%` }} />
        </div>
        <p className="text-xs text-gray-500 flex-shrink-0">21 / 31 days</p>
      </div>

      {/* Bar chart */}
      <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
        {forecastDays.map((day, i) => {
          const x = i * colW + colW / 2
          const bh = (day.kwh / maxKwh) * maxBarH
          const by = barBaseY - bh
          const isToday = i === 0
          return (
            <g key={i}>
              <rect
                x={x - barW / 2} y={by}
                width={barW} height={bh}
                fill={isToday ? "#f59e0b" : day.type === "rainy" ? "#374151" : "#1e3a6b"}
                opacity={isToday ? 1 : 0.7}
                rx="1.5"
              />
              {weatherShape(day.type, x, by - 6)}
              <text x={x} y={H - 3} textAnchor="middle"
                fill={isToday ? "#f59e0b" : "#4b5563"} fontSize="6" fontFamily="system-ui">
                {isToday ? "today" : day.d}
              </text>
            </g>
          )
        })}
      </svg>

      {/* Legend */}
      <div className="flex gap-3 mt-1">
        {[{ c: "#fbbf24", l: "Sunny" }, { c: "#9ca3af", l: "Partly" }, { c: "#60a5fa", l: "Rainy" }].map(s => (
          <div key={s.l} className="flex items-center gap-1">
            <div className="w-2 h-2 rounded-full" style={{ background: s.c }} />
            <span className="text-xs text-gray-600">{s.l}</span>
          </div>
        ))}
      </div>
    </div>
  )
}

// ─── Aerial Map ───────────────────────────────────────────────────────────────

function AerialMap({ park }) {
  const W = 300, H = 178
  const [vb, setVb] = useState({ x: 0, y: 0, w: W, h: H })
  const [dragging, setDragging] = useState(false)
  const dragRef = useRef(null)

  const PANEL_W = 10, PANEL_H = 5, H_GAP = 1, V_GAP = 7
  const PPR = 24, TOTAL_ROWS = 16, MX = 8, MY = 9
  const ROAD_H = 11, ROAD_Y = MY + 8 * (PANEL_H + V_GAP)

  const rowY = (r) => r < 8
    ? MY + r * (PANEL_H + V_GAP)
    : MY + 8 * (PANEL_H + V_GAP) + ROAD_H + 3 + (r - 8) * (PANEL_H + V_GAP)

  const isInvestor = (r, p) =>
    r === park.investorRow && p >= park.investorColStart && p < park.investorColStart + park.investorPanels

  const doZoom = (f) => setVb(v => {
    const nw = Math.min(W, Math.max(70, v.w * f)), nh = Math.min(H, Math.max(42, v.h * f))
    return { x: Math.max(0, Math.min(W - nw, v.x + (v.w - nw) / 2)), y: Math.max(0, Math.min(H - nh, v.y + (v.h - nh) / 2)), w: nw, h: nh }
  })

  const applyDrag = (cx, cy) => {
    if (!dragRef.current) return
    const scale = W / vb.w
    setVb(v => ({
      ...v,
      x: Math.max(0, Math.min(W - v.w, v.x - (cx - dragRef.current.x) / scale)),
      y: Math.max(0, Math.min(H - v.h, v.y - (cy - dragRef.current.y) / scale)),
    }))
    dragRef.current = { x: cx, y: cy }
  }

  const invLabelX = MX + (park.investorColStart + park.investorPanels / 2) * (PANEL_W + H_GAP)
  const invRowY = rowY(park.investorRow)

  return (
    <div className="relative rounded-xl overflow-hidden select-none" style={{ height: H }}>
      <svg width="100%" height="100%" viewBox={`${vb.x} ${vb.y} ${vb.w} ${vb.h}`}
        style={{ cursor: dragging ? "grabbing" : "grab", display: "block" }}
        onMouseDown={e => { setDragging(true); dragRef.current = { x: e.clientX, y: e.clientY } }}
        onMouseMove={e => applyDrag(e.clientX, e.clientY)}
        onMouseUp={() => { setDragging(false); dragRef.current = null }}
        onMouseLeave={() => { setDragging(false); dragRef.current = null }}
        onTouchStart={e => { dragRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY } }}
        onTouchMove={e => applyDrag(e.touches[0].clientX, e.touches[0].clientY)}
        onTouchEnd={() => { dragRef.current = null }}>
        <rect width={W} height={H} fill="#4d6127" />
        {Array.from({ length: 12 }, (_, i) => <rect key={i} x={0} y={i * 15} width={W} height={8} fill="#435520" opacity="0.45" />)}
        {Array.from({ length: TOTAL_ROWS }, (_, r) => {
          const y = rowY(r)
          return Array.from({ length: PPR }, (_, p) => {
            const x = MX + p * (PANEL_W + H_GAP), inv = isInvestor(r, p)
            return <rect key={`${r}-${p}`} x={x} y={y} width={PANEL_W} height={PANEL_H}
              fill={inv ? "#f59e0b" : "#1a3560"} stroke={inv ? "#fcd34d" : "#243f75"}
              strokeWidth={inv ? 0.6 : 0.3} rx="0.4" />
          })
        })}
        {Array.from({ length: TOTAL_ROWS }, (_, r) => (
          <rect key={r} x={MX} y={rowY(r) + PANEL_H} width={PPR * (PANEL_W + H_GAP) - H_GAP} height={2} fill="#000" opacity="0.13" />
        ))}
        <rect x={MX} y={ROAD_Y} width={PPR * (PANEL_W + H_GAP) - H_GAP} height={ROAD_H} fill="#9b8c5e" opacity="0.65" />
        <line x1={MX} y1={ROAD_Y + ROAD_H / 2} x2={MX + PPR * (PANEL_W + H_GAP)} y2={ROAD_Y + ROAD_H / 2}
          stroke="#b5a472" strokeWidth="0.6" strokeDasharray="5,4" opacity="0.7" />
        <line x1={invLabelX} y1={invRowY - 2} x2={invLabelX} y2={invRowY - 7} stroke="#f59e0b" strokeWidth="0.8" />
        <rect x={invLabelX - 18} y={invRowY - 17} width={36} height={9} rx="2" fill="rgba(0,0,0,0.6)" />
        <text x={invLabelX} y={invRowY - 10} textAnchor="middle" fill="#fbbf24" fontSize="5.5" fontFamily="system-ui" fontWeight="600">Your panels</text>
        <rect x="1.5" y="1.5" width={W - 3} height={H - 3} fill="none" stroke="#a09862" strokeWidth="1.5" rx="1" />
        <g transform="translate(283, 16)">
          <circle r="9" fill="rgba(0,0,0,0.55)" />
          <polygon points="0,-6 2,0 0,2 -2,0" fill="white" opacity="0.9" />
          <polygon points="0,2 2,6 0,4 -2,6" fill="white" opacity="0.4" />
          <text textAnchor="middle" y="-7" fill="white" fontSize="4.5" fontFamily="system-ui" fontWeight="bold">N</text>
        </g>
        <g transform="translate(9, 166)">
          <rect width={20} height={2.5} fill="white" opacity="0.7" />
          <rect x={10} width={10} height={2.5} fill="#2d3748" opacity="0.9" />
          <text y={9} fill="white" fontSize="5" fontFamily="monospace" opacity="0.75">100m</text>
        </g>
        <text x={W - 4} y={H - 3} fill="#d4d45a" fontSize="5" fontFamily="monospace" opacity="0.8" textAnchor="end">
          {park.lat} {park.lng}
        </text>
      </svg>
      <div className="absolute top-2 right-2 flex flex-col gap-1">
        {[
          { icon: <ZoomIn size={12} />, action: () => doZoom(0.6) },
          { icon: <Maximize2 size={10} />, action: () => setVb({ x: 0, y: 0, w: W, h: H }) },
          { icon: <ZoomOut size={12} />, action: () => doZoom(1.6) },
        ].map((btn, i) => (
          <button key={i} onClick={btn.action}
            className="w-7 h-7 bg-black/60 hover:bg-black/80 rounded-lg flex items-center justify-center text-white transition-colors">
            {btn.icon}
          </button>
        ))}
      </div>
    </div>
  )
}

// ─── Panel Ownership Grid ─────────────────────────────────────────────────────

function PanelOwnershipGrid({ park }) {
  const COLS = 28, ROWS = 22, PW = 8, PH = 5, GAP = 1.5
  const W = COLS * (PW + GAP) - GAP, H = ROWS * (PH + GAP) - GAP
  const isInvestor = (r, c) => r === park.investorRow && c >= park.investorColStart && c < park.investorColStart + park.investorPanels
  const hX = park.investorColStart * (PW + GAP) - 1, hY = park.investorRow * (PH + GAP) - 1
  const hW = park.investorPanels * (PW + GAP) + 1, hH = PH + 2
  return (
    <div style={{ overflowX: "auto" }}>
      <svg width={W} height={H + 22}>
        {Array.from({ length: ROWS }, (_, r) => Array.from({ length: COLS }, (_, c) => {
          const inv = isInvestor(r, c)
          return <rect key={`${r}-${c}`} x={c * (PW + GAP)} y={r * (PH + GAP)} width={PW} height={PH}
            fill={inv ? "#f59e0b" : "#1a3560"} opacity={inv ? 1 : 0.4} rx="0.5" />
        }))}
        <rect x={hX} y={hY} width={hW} height={hH} fill="none" stroke="#f59e0b" strokeWidth="1.2" strokeDasharray="3,2" rx="1.5" />
        <text x={hX + hW / 2} y={H + 14} textAnchor="middle" fill="#f59e0b" fontSize="7.5" fontFamily="system-ui" fontWeight="600">
          Row {park.investorRow + 1} · Panels {park.startPanel}–{park.startPanel + park.investorPanels - 1}
        </text>
      </svg>
      <div className="flex gap-4 mt-2">
        <div className="flex items-center gap-1.5"><div className="w-3.5 h-2.5 rounded-sm bg-amber-500" /><span className="text-xs text-gray-400">Your {park.investorPanels} panels</span></div>
        <div className="flex items-center gap-1.5"><div className="w-3.5 h-2.5 rounded-sm bg-blue-900 opacity-50" /><span className="text-xs text-gray-400">Other investors</span></div>
      </div>
    </div>
  )
}

// ─── Module Illustration ──────────────────────────────────────────────────────

function ModuleIllustration({ panelNumber }) {
  const CC = 10, CR = 6, CW = 19, CH = 23, CG = 2, FR = 8
  const iW = CC * (CW + CG) - CG, iH = CR * (CH + CG) - CG
  const tW = iW + 2 * FR, tH = iH + 2 * FR
  return (
    <svg width={tW} height={tH + 34} viewBox={`0 0 ${tW} ${tH + 34}`}>
      <rect width={tW} height={tH} rx="4" fill="#8d99a6" />
      <rect x={2} y={2} width={tW - 4} height={tH - 4} rx="3" fill="#a8b4bf" />
      <rect x={4} y={4} width={tW - 8} height={tH - 8} rx="2.5" fill="#2c3e50" />
      <rect x={FR - 2} y={FR - 2} width={iW + 4} height={iH + 4} rx="1.5" fill="#1b3358" />
      <path d={`M${FR + 4},${FR + 4} L${FR + iW * 0.28},${FR + 4} L${FR + 4},${FR + iH * 0.2} Z`} fill="white" opacity="0.04" />
      {Array.from({ length: CR }, (_, r) => Array.from({ length: CC }, (_, c) => {
        const x = FR + c * (CW + CG), y = FR + r * (CH + CG)
        return (
          <g key={`${r}-${c}`}>
            <rect x={x} y={y} width={CW} height={CH} fill="#0c1f3f" rx="0.5" />
            <rect x={x} y={y} width={CW} height={CH} rx="0.5" fill="none" stroke="#1a3660" strokeWidth="0.4" />
            <line x1={x + CW * 0.3} y1={y + 1} x2={x + CW * 0.3} y2={y + CH - 1} stroke="#b8c4cc" strokeWidth="0.5" opacity="0.55" />
            <line x1={x + CW * 0.7} y1={y + 1} x2={x + CW * 0.7} y2={y + CH - 1} stroke="#b8c4cc" strokeWidth="0.5" opacity="0.55" />
            {Array.from({ length: 5 }, (_, fl) => (
              <line key={fl} x1={x + 1} y1={y + (fl + 1) * CH / 6} x2={x + CW - 1} y2={y + (fl + 1) * CH / 6} stroke="#b8c4cc" strokeWidth="0.25" opacity="0.3" />
            ))}
          </g>
        )
      }))}
      {Array.from({ length: CC - 1 }, (_, c) => <rect key={c} x={FR + (c + 1) * (CW + CG) - CG} y={FR} width={CG} height={iH} fill="#0a1929" />)}
      {Array.from({ length: CR - 1 }, (_, r) => <rect key={r} x={FR} y={FR + (r + 1) * (CH + CG) - CG} width={iW} height={CG} fill="#0a1929" />)}
      <rect x={tW / 2 - 20} y={tH - 16} width={40} height={12} rx="2.5" fill="#374151" stroke="#4b5563" strokeWidth="0.8" />
      <circle cx={tW / 2 - 10} cy={tH - 10} r="3.5" fill="#1f2937" stroke="#6b7280" strokeWidth="0.6" />
      <circle cx={tW / 2 + 10} cy={tH - 10} r="3.5" fill="#1f2937" stroke="#6b7280" strokeWidth="0.6" />
      <rect x={tW / 2 - 22} y={tH - 12} width={3} height={5} rx="1" fill="#1f2937" stroke="#6b7280" strokeWidth="0.4" />
      <rect x={tW / 2 + 19} y={tH - 12} width={3} height={5} rx="1" fill="#1f2937" stroke="#6b7280" strokeWidth="0.4" />
      {[[FR / 2, tH / 2], [tW - FR / 2, tH / 2], [tW / 2, FR / 2], [tW / 2, tH - FR / 2]].map(([cx, cy], i) => (
        <circle key={i} cx={cx} cy={cy} r="2.2" fill="#1e2a38" stroke="#7a8694" strokeWidth="0.6" />
      ))}
      <rect x={FR} y={FR} width={54} height={13} rx="2" fill="rgba(0,0,0,0.65)" />
      <text x={FR + 5} y={FR + 9} fill="#f59e0b" fontSize="7.5" fontFamily="system-ui" fontWeight="700">Panel #{panelNumber}</text>
      <text x={tW / 2} y={tH + 14} textAnchor="middle" fill="#f59e0b" fontSize="9" fontFamily="system-ui" fontWeight="600">Your module · Panel #{panelNumber}</text>
      <text x={tW / 2} y={tH + 27} textAnchor="middle" fill="#6b7280" fontSize="7" fontFamily="system-ui">400 Wp · Monocrystalline PERC · 21.5% efficiency</text>
    </svg>
  )
}
